<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">ClawdBot Go animated hero</title>
  <desc id="desc">Animated neon command surface for the Solana-first ClawdBot Go runtime, showing OODA, ZK, x402, Phoenix, Helius, and the compact source footprint.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#061117"/>
      <stop offset="0.45" stop-color="#0b1525"/>
      <stop offset="1" stop-color="#13091c"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#14f195" stop-opacity="0"/>
      <stop offset="0.35" stop-color="#14f195" stop-opacity="0.95"/>
      <stop offset="0.68" stop-color="#00d4ff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#9945ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#14f195"/>
      <stop offset="0.5" stop-color="#00d4ff"/>
      <stop offset="1" stop-color="#9945ff"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.08 0 0 0 0 0.95 0 0 0 0 0.73 0 0 0 0.75 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#1b3750" stroke-width="1" opacity="0.42"/>
    </pattern>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="28" fill="url(#grid)" opacity="0.8"/>
  <path d="M80 322C220 260 340 258 500 305C690 360 825 305 970 250C1062 214 1120 218 1160 236" fill="none" stroke="#9945ff" stroke-width="2" opacity="0.4"/>
  <path d="M35 72H1165" stroke="url(#beam)" stroke-width="3" opacity="0.8">
    <animate attributeName="d" dur="5s" repeatCount="indefinite" values="M35 72H1165;M35 96H1165;M35 72H1165"/>
  </path>
  <rect x="-380" y="0" width="340" height="420" fill="url(#beam)" opacity="0.16">
    <animate attributeName="x" from="-380" to="1240" dur="4.8s" repeatCount="indefinite"/>
  </rect>

  <g filter="url(#glow)">
    <text x="70" y="116" class="mono" font-size="22" fill="#14f195">go run ./cmd/clawdbot --solana --zk --ooda</text>
    <text x="70" y="210" class="sans" font-size="78" font-weight="800" letter-spacing="2" fill="url(#word)">CLAWDBOT GO</text>
    <text x="74" y="258" class="sans" font-size="25" fill="#d6f5ff">Sovereign Solana trading intelligence in a compact Go runtime</text>
  </g>

  <g class="mono" font-size="18" fill="#d9fff2">
    <text x="78" y="314">0.52 MB source archive</text>
    <text x="78" y="346">3.86 MiB working source</text>
    <text x="78" y="378">4.20 MB target: PASSED</text>
  </g>

  <g transform="translate(745 108)">
    <circle cx="160" cy="110" r="98" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.65"/>
    <circle cx="160" cy="110" r="62" fill="none" stroke="#14f195" stroke-width="2" opacity="0.75"/>
    <circle cx="160" cy="110" r="24" fill="#14f195" opacity="0.12"/>
    <circle cx="160" cy="110" r="7" fill="#14f195"/>
    <g>
      <circle cx="160" cy="12" r="6" fill="#14f195"/>
      <circle cx="258" cy="110" r="6" fill="#00d4ff"/>
      <circle cx="160" cy="208" r="6" fill="#9945ff"/>
      <circle cx="62" cy="110" r="6" fill="#14f195"/>
      <animateTransform attributeName="transform" type="rotate" from="0 160 110" to="360 160 110" dur="10s" repeatCount="indefinite"/>
    </g>
    <g class="mono" font-size="14" fill="#c8f8ff">
      <text x="135" y="6">OODA</text>
      <text x="274" y="116">ZK</text>
      <text x="139" y="232">x402</text>
      <text x="0" y="116">DAS</text>
    </g>
  </g>

  <g class="mono" font-size="16">
    <rect x="760" y="286" width="360" height="62" rx="14" fill="#07131d" stroke="#1bffb4" stroke-opacity="0.45"/>
    <text x="786" y="324" fill="#14f195">Phoenix</text>
    <text x="884" y="324" fill="#00d4ff">Helius</text>
    <text x="972" y="324" fill="#cfa8ff">Jupiter</text>
  </g>

  <g opacity="0.9">
    <circle cx="112" cy="82" r="3" fill="#14f195">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1056" cy="84" r="3" fill="#00d4ff">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1132" cy="350" r="3" fill="#9945ff">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
